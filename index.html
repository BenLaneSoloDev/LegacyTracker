<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="styles.css">
    <title>Legacy Tracker</title>
</head>
<body>
    <header class="title-div">
        <h1>Legacy Tracker</h1>
    </header>
    <section class="search-div">
        <h2>Use the filters below to create a create a movie <strong>legacy</strong> heatmap </h2>
        <form class="filter-list">

            <div class="filter franchise">
                <label for="franchise-select">Franchise</label>
                <select id="franchise-select" name="franchises">
                    <option value="">None</option>
                    <option value="mcu">MCU</option>
                    <option value="dcu">DCU</option>
                    <option value="star-wars">Star Wars</option>
                    <option value="harry-potter">Harry Potter</option>
                </select>
            </div>

            <div class="creative">
                <div class="filter person">
                    <label for="person-select">Person</label>
                    <input type="text" id="person-select" name="person" list="person-list" placeholder="Type a person (e.g. Nolan)..." autocomplete="off">
                    <datalist id="person-results"></datalist> <!-- Data list is filled by a request -->
                </div>

                <div class="filter role" hidden> <!-- Must be made visible upon choosing a person -->
                    <label for="role-select">Role</label>
                    <select id="role-select" name="role" disabled> <!-- Must be made functional upon choosing a person -->
                        <option value="all">All Roles</option>
                        <option value="actor">Actor</option>
                        <option value="director">Director</option>
                        <option value="writer">Writer</option>
                    </select>
                </div>
            </div>

            <div class="filter decade">
                <label for="decade-select">Decade</label>
                <select id="decade-select" name="decade">
                    <option value="">All Decades</option>
                    <!-- JavaScript function will generate all valid decades -->
                </select>
            </div>

            <button type="submit" id="filter-submit">Generate</button>
        </form> 
    </section>
    <main class="display-div">
        <div class="grid">
            <!-- Generated Grid Will Go Here -->
        </div>
    </main>
    <footer class="linkDiv">
        <p>Check out my other projects: <em>LINKEDIN LINK</em></p>
    </footer>
</body>
</html>
